apiVersion: apps/v1
kind: Deployment
metadata:
  name: solar-system

spec:
  replicas: 2

  selector:
    matchLabels:
      app: solar-system

  template:
    metadata:
      labels:
        app: solar-system

    spec:
      containers:
      - name: solar-system
        image: 533267078841.dkr.ecr.us-east-1.amazonaws.com/solar-system:2092880b65dcc23b3c9796fd7198c546e922f8da
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
